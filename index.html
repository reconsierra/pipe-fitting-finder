<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Thread Finder (PoC)</title>
  <style>
    :root { --bg:#0b0f14; --card:#121923; --muted:#9db0c7; --text:#eaf2ff; --line:#1e2a3a; --btn:#172233; --btn2:#2b7cff; --ok:#38d996; --warn:#ffcc66; }
    body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); }
    header { padding:14px 16px; border-bottom:1px solid var(--line); }
    header h1 { margin:0; font-size:16px; }
    main { padding:16px; max-width:980px; margin:0 auto; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px; }
    .muted { color:var(--muted); font-size:12px; }
    .pick { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .pickBtn { border:1px solid var(--line); border-radius:12px; background:#0f1621; padding:10px; cursor:pointer; display:flex; flex-direction:column; gap:10px; align-items:center; }
    .pickBtn:hover { border-color:#2a3a52; }
    .pickBtn.active { outline:2px solid var(--btn2); border-color:var(--btn2); }
    .pickBtn img { width:100%; max-width:260px; height:auto; display:block; border-radius:10px; background:#fff; }
    .btnrow { display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; }
    button { background:var(--btn); border:1px solid #2a3a52; color:var(--text); padding:10px 12px; border-radius:10px; cursor:pointer; font-weight:600; }
    button.primary { background:linear-gradient(180deg, #2b7cff, #1e5fe0); border:1px solid #2b7cff; }
    button:disabled { opacity:.55; cursor:not-allowed; }
    label { display:block; margin:10px 0 6px; font-size:12px; color:#cfe3ff; }
    select { width:100%; padding:10px; border-radius:10px; border:1px solid #2a3a52; background:#0f1621; color:var(--text); }
    .result { border:1px solid #22334a; border-radius:12px; padding:12px; background:#0f1621; }
    .result + .result { margin-top:10px; }
    .badge { display:inline-block; padding:3px 8px; border-radius:999px; font-size:12px; margin-left:8px; }
    .best { background:rgba(56,217,150,.15); border:1px solid rgba(56,217,150,.45); color:var(--ok); }
    .alt { background:rgba(255,204,102,.12); border:1px solid rgba(255,204,102,.45); color:var(--warn); }
    .kvs { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:8px; margin-top:8px; }
    .kv { background:#0b111a; border:1px solid var(--line); border-radius:10px; padding:10px; }
    .kv b { display:block; font-size:12px; }
    .kv span { color:var(--muted); font-size:12px; }
    .tiny { font-size:11px; color:var(--muted); margin-top:8px; }
  </style>
</head>
<body>
<header><h1>Thread Finder (PoC)</h1></header>
<main>
  <div class="card">
    <div class="pick" role="group" aria-label="Choose system">
      <div class="pickBtn" id="pickMetric" tabindex="0" aria-label="Metric">
        <img src="metric.png" alt="Metric" />
        <div class="muted">Metric</div>
      </div>
      <div class="pickBtn" id="pickImperial" tabindex="0" aria-label="Imperial">
        <img src="imperial.png" alt="Imperial" />
        <div class="muted">Imperial</div>
      </div>
    </div>
    <div class="btnrow">
      <button id="btnMale" disabled>Male</button>
      <button id="btnFemale" disabled>Female</button>
      <button id="btnUnsure" disabled>Not sure</button>
      <button id="btnReset">Reset</button>
    </div>
    <div class="tiny" id="state"></div>
  </div>

  <div class="card" id="panel" style="display:none; margin-top:12px;">
    <div class="muted" id="tol"></div>
    <div id="inputs"></div>
    <div class="btnrow">
      <button class="primary" id="btnFind">Find</button>
      <button id="btnClear">Clear</button>
    </div>
    <div id="results" style="margin-top:12px"></div>
  </div>

let systemKey = null;
let sexKey = null;
const el = (id)=>document.getElementById(id);

function setActivePick() {
  el('pickMetric').classList.toggle('active', systemKey==='metric');
  el('pickImperial').classList.toggle('active', systemKey==='imperial');
}

function resetAll() {
  systemKey = null; sexKey = null;
  setActivePick();
  ['btnMale','btnFemale','btnUnsure'].forEach(i=>el(i).disabled=true);
  el('panel').style.display='none';
  el('inputs').innerHTML='';
  el('results').innerHTML='';
  el('state').textContent='';
}

function setSystem(key) {
  systemKey = key;
  setActivePick();
  sexKey = null;
  ['btnMale','btnFemale','btnUnsure'].forEach(i=>el(i).disabled=false);
  el('panel').style.display='none';
  el('inputs').innerHTML='';
  el('results').innerHTML='';
  el('state').textContent = (key==='metric') ? 'Metric' : 'Imperial';
}

function setSex(key) {
  sexKey = key;
  buildInputs();
  el('panel').style.display='block';
  el('results').innerHTML='';
  el('state').textContent = (systemKey==='metric'?'Metric':'Imperial') + ' • ' + key;
}

function rangeLabel(r) { return r.min.toFixed(2) + '–' + r.max.toFixed(2) + ' mm'; }

function buildSelect(id, label, options) {
  const wrap = document.createElement('div');
  const lab = document.createElement('label');
  lab.setAttribute('for', id);
  lab.textContent = label;
  const sel = document.createElement('select');
  sel.id = id;
  const opt0 = document.createElement('option');
  opt0.value = '';
  opt0.textContent = 'Not sure';
  sel.appendChild(opt0);
  for (const o of options) {
    const opt = document.createElement('option');
    opt.value = o.value;
    opt.textContent = o.text;
    sel.appendChild(opt);
  }
  wrap.appendChild(lab);
  wrap.appendChild(sel);
  return wrap;
}

function uniqueBy(arr, keyFn) {
  const seen = new Set();
  const out = [];
  for (const item of arr) {
    const k = keyFn(item);
    if (!seen.has(k)) { seen.add(k); out.push(item); }
  }
  return out;
}

function buildRangeOption(measKey, entry) {
  const r = entry.measurements[measKey];
  return { value: JSON.stringify({ key: measKey, min: r.min, max: r.max }), text: rangeLabel(r) };
}

function buildInputs() {
  const inputs = el('inputs');
  inputs.innerHTML='';
  const tol = DATASET.tolerancesMm;
  el('tol').textContent = '±' + tol.maleThreadOD + ' OD • ±' + tol.femaleOpeningID + ' opening • ±' + tol.maleBoreID + ' bore';

  const entries = DATASET.systems[systemKey].entries;
  const odOptions = uniqueBy(entries.map(e=>buildRangeOption('maleThreadOD', e)), o=>o.text);
  const femaleOptions = uniqueBy(entries.map(e=>buildRangeOption('femaleOpeningID', e)), o=>o.text);
  const boreEntries = entries.filter(e=>e.measurements.maleBoreID);
  const boreOptions = uniqueBy(boreEntries.map(e=>buildRangeOption('maleBoreID', e)), o=>o.text);

  if (sexKey === 'male') {
    inputs.appendChild(buildSelect('selOD', 'OD', odOptions));
    if (boreOptions.length) inputs.appendChild(buildSelect('selBore', 'Bore', boreOptions));
  } else if (sexKey === 'female') {
    inputs.appendChild(buildSelect('selFemale', 'Opening', femaleOptions));
  } else {
    inputs.appendChild(buildSelect('selOD', 'OD', odOptions));
    if (boreOptions.length) inputs.appendChild(buildSelect('selBore', 'Bore', boreOptions));
    inputs.appendChild(buildSelect('selFemale', 'Opening', femaleOptions));
  }
}

function parseSel(val) { if (!val) return null; try { return JSON.parse(val); } catch { return null; } }
function overlaps(aMin,aMax,bMin,bMax){ return Math.max(aMin,bMin) <= Math.min(aMax,bMax); }

function scoreByOverlap(entry, selections) {
  let used=0, score=0;
  for (const s of selections) {
    used++;
    const r = entry.measurements[s.key];
    if (!r) continue;
    if (overlaps(r.min, r.max, s.min, s.max)) score++;
  }
  return {used, score};
}

function findMatches() {
  const entries = DATASET.systems[systemKey].entries;
  const selOD = el('selOD') ? parseSel(el('selOD').value) : null;
  const selBore = el('selBore') ? parseSel(el('selBore').value) : null;
  const selFemale = el('selFemale') ? parseSel(el('selFemale').value) : null;
  const selections = [selOD, selBore, selFemale].filter(Boolean);

  const out = el('results');
  out.innerHTML='';
  if (!selections.length) { out.innerHTML='<div class="muted">Pick a range</div>'; return; }

  const scored = entries.map(e=>({ e, ...scoreByOverlap(e, selections) }))
    .filter(x=>x.used>0 && x.score>0)
    .sort((a,b)=> (b.score/b.used) - (a.score/a.used));

  if (!scored.length) { out.innerHTML='<div class="muted">No match</div>'; return; }

  const bestRatio = scored[0].score / scored[0].used;

  for (const s of scored) {
    const ratio = s.score / s.used;
    const div = document.createElement('div');
    div.className='result';
    const badge = (ratio===bestRatio) ? '<span class="badge best">Best</span>' : '<span class="badge alt">Close</span>';
    const label = (systemKey==='metric') ? s.e.designation.split(' ')[0] : s.e.designation;

    const m = s.e.measurements;
    const bore = m.maleBoreID ? '<div class="kv"><b>Bore</b><span>' + rangeLabel(m.maleBoreID) + '</span></div>' : '';

    div.innerHTML =
      '<div><b>' + label + '</b> ' + badge + ' <span class="muted">' + s.score + '/' + s.used + '</span></div>' +
      '<div class="kvs">' +
        '<div class="kv"><b>OD</b><span>' + rangeLabel(m.maleThreadOD) + '</span></div>' +
        '<div class="kv"><b>Opening</b><span>' + rangeLabel(m.femaleOpeningID) + '</span></div>' +
        bore +
      '</div>';

    out.appendChild(div);
  }
}

function clearSelections(){ ['selOD','selBore','selFemale'].forEach(id=>{ if (el(id)) el(id).value=''; }); el('results').innerHTML=''; }
function wirePick(id,key){ const n=el(id); n.addEventListener('click',()=>setSystem(key)); n.addEventListener('keydown',(e)=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();setSystem(key);} }); }

wirePick('pickMetric','metric');
wirePick('pickImperial','imperial');

el('btnMale').addEventListener('click',()=>setSex('male'));
el('btnFemale').addEventListener('click',()=>setSex('female'));
el('btnUnsure').addEventListener('click',()=>setSex('unsure'));

document.getElementById('btnFind').addEventListener('click', findMatches);
document.getElementById('btnClear').addEventListener('click', clearSelections);
document.getElementById('btnReset').addEventListener('click', resetAll);

resetAll();
</script>

</html>
