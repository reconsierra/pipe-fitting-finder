<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Thread Finder</title>
  <style>
    :root { --bg:#0b0f14; --card:#121923; --muted:#9db0c7; --text:#eaf2ff; --line:#1e2a3a; --btn:#172233; --btn2:#2b7cff; --ok:#38d996; --warn:#ffcc66; }
    body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); }
    header { padding:14px 16px; border-bottom:1px solid var(--line); }
    header h1 { margin:0; font-size:16px; }
    main { padding:16px; max-width:980px; margin:0 auto; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px; }
    .muted { color:var(--muted); font-size:12px; }
    .pick { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .pickBtn { border:1px solid var(--line); border-radius:12px; background:#0f1621; padding:10px; cursor:pointer; display:flex; flex-direction:column; gap:10px; align-items:center; }
    .pickBtn:hover { border-color:#2a3a52; }
    .pickBtn.active { outline:2px solid var(--btn2); border-color:var(--btn2); }
    .pickBtn img { width:100%; max-width:260px; height:auto; display:block; border-radius:10px; background:#fff; }
    .btnrow { display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; }
    button { background:var(--btn); border:1px solid #2a3a52; color:var(--text); padding:10px 12px; border-radius:10px; cursor:pointer; font-weight:600; }
    button.primary { background:linear-gradient(180deg, #2b7cff, #1e5fe0); border:1px solid #2b7cff; }
    button:disabled { opacity:.55; cursor:not-allowed; }
    label { display:block; margin:10px 0 6px; font-size:12px; color:#cfe3ff; }
    select { width:100%; padding:10px; border-radius:10px; border:1px solid #2a3a52; background:#0f1621; color:var(--text); }
    .result { border:1px solid #22334a; border-radius:12px; padding:12px; background:#0f1621; }
    .result + .result { margin-top:10px; }
    .badge { display:inline-block; padding:3px 8px; border-radius:999px; font-size:12px; margin-left:8px; }
    .best { background:rgba(56,217,150,.15); border:1px solid rgba(56,217,150,.45); color:var(--ok); }
    .alt { background:rgba(255,204,102,.12); border:1px solid rgba(255,204,102,.45); color:var(--warn); }
    .kvs { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:8px; margin-top:8px; }
    .kv { background:#0b111a; border:1px solid var(--line); border-radius:10px; padding:10px; }
    .kv b { display:block; font-size:12px; }
    .kv span { color:var(--muted); font-size:12px; }
    .tiny { font-size:11px; color:var(--muted); margin-top:8px; }
  </style>
</head>
<body>
<header><h1>Thread Finder</h1></header>
<main>
  <div class="card">
    <div class="pick" role="group" aria-label="Choose system">
      <div class="pickBtn" id="pickMetric" tabindex="0" aria-label="Metric">
        <img src="metric.png" alt="Metric" />
        <div class="muted">Metric</div>
      </div>
      <div class="pickBtn" id="pickImperial" tabindex="0" aria-label="Imperial">
        <img src="imperial.png" alt="Imperial" />
        <div class="muted">Imperial</div>
      </div>
    </div>

    <div class="btnrow">
      <button id="btnMale" disabled>Male</button>
      <button id="btnFemale" disabled>Female</button>
      <button id="btnUnsure" disabled>Not sure</button>
      <button id="btnReset">Reset</button>
    </div>
    <div class="tiny" id="state"></div>
  </div>

  <div class="card" id="panel" style="display:none; margin-top:12px;">
    <div class="muted" id="tol"></div>
    <div id="inputs"></div>
    <div class="btnrow">
      <button class="primary" id="btnFind">Find</button>
      <button id="btnClear">Clear</button>
    </div>
    <div id="results" style="margin-top:12px"></div>
  </div>
